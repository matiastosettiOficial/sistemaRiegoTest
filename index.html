<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Panel de Riego</title>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: #eef5f1;
  margin: 0;
}

/* HEADER */
.header {
  background: #1b5e20;
  padding: 15px;
  text-align: center;
}

.header img {
  width: 140px;
}

/* CONTENEDOR */
.container {
  padding: 20px;
  max-width: 400px;
  margin: auto;
}

/* CARD */
.card {
  background: white;
  border-radius: 12px;
  padding: 15px;
  margin-bottom: 15px;
  box-shadow: 0 6px 15px rgba(0,0,0,0.1);
}

/* TITULOS */
h2 {
  margin-top: 0;
  color: #2e7d32;
}

/* INPUTS */
input[type="time"] {
  width: 100%;
  padding: 8px;
  margin: 6px 0;
  border-radius: 6px;
  border: 1px solid #ccc;
}

/* CHECKBOX GRID */
.dias {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
}

.dias label {
  font-size: 14px;
}

/* BOTÓN PRINCIPAL */
.btn {
  width: 100%;
  padding: 12px;
  background: #2e7d32;
  color: white;
  border: none;
  border-radius: 8px;
  margin-top: 10px;
  font-weight: bold;
  cursor: pointer;
}

.btn:hover {
  background: #1b5e20;
}

/* MENSAJE */
#mensaje {
  text-align: center;
  font-weight: bold;
  margin: 10px 0;
}

.exito { color: green; }
.error { color: red; }

/* TARJETAS DE RIEGO */
.riego {
  background: #f1f8e9;
  border-left: 5px solid #2e7d32;
  padding: 10px;
  border-radius: 8px;
  margin-bottom: 10px;
}

.riego h3 {
  margin: 0;
}

.estado {
  font-size: 12px;
  color: #666;
}
</style>

</head>

<body>

<!-- HEADER -->
<div class="header">
  <img src="IDENTIDAD HUERTAS FAMILIARES FONDO BLANCO.jpg">
</div>

<div class="container">

<!-- CONFIGURACIÓN -->
<div class="card">
  <h2>⚙️ Nueva configuración</h2>

  <form id="formulario">

    <div class="dias">
      <label><input type="checkbox" value="Lunes"> Lunes</label>
      <label><input type="checkbox" value="Martes"> Martes</label>
      <label><input type="checkbox" value="Miércoles"> Miércoles</label>
      <label><input type="checkbox" value="Jueves"> Jueves</label>
      <label><input type="checkbox" value="Viernes"> Viernes</label>
      <label><input type="checkbox" value="Sábado"> Sábado</label>
      <label><input type="checkbox" value="Domingo"> Domingo</label>
    </div>

    <input type="time" id="inicio" placeholder="Hora inicio">
    <input type="time" id="fin" placeholder="Hora fin">

    <button class="btn" type="submit">📡 Enviar al dispositivo</button>

  </form>

  <p id="mensaje"></p>
</div>

<!-- LISTA DE RIEGOS -->
<div class="card">
  <h2>🌱 Programaciones activas</h2>
  <div id="lista"></div>
</div>

</div>

<script>

const formulario = document.getElementById("formulario");
const inicio = document.getElementById("inicio");
const fin = document.getElementById("fin");
const checks = document.querySelectorAll("input[type=checkbox]");
const mensaje = document.getElementById("mensaje");
const lista = document.getElementById("lista");

let contador = 1;

formulario.addEventListener("submit", function(e) {
  e.preventDefault();

  let dias = [];

  checks.forEach(c => {
    if (c.checked) dias.push(c.value);
  });

  mensaje.className = "";

  if (dias.length === 0 || inicio.value === "" || fin.value === "") {
    mensaje.innerText = "⚠️ Completar todos los datos";
    mensaje.classList.add("error");
    return;
  }

  if (fin.value <= inicio.value) {
    mensaje.innerText = "⚠️ Hora fin debe ser mayor";
    mensaje.classList.add("error");
    return;
  }

  mensaje.innerText = "✅ Enviado correctamente al sistema";
  mensaje.classList.add("exito");

  lista.innerHTML += `
    <div class="riego">
      <h3>Riego ${contador}</h3>
      <p>${dias.join(", ")}</p>
      <p>⏱ ${inicio.value} - ${fin.value}</p>
      <p class="estado">Estado: Programado</p>
    </div>
  `;

  contador++;
  formulario.reset();
});

</script>

</body>
</html>
