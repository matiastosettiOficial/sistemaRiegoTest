<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Sistema de Riego</title>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #e8f5e9, #c8e6c9);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
}

.container {
  background: white;
  padding: 25px;
  border-radius: 12px;
  width: 340px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.1);
}

h1 {
  text-align: center;
  color: #2e7d32;
}

form {
  display: flex;
  flex-direction: column;
}

.grupo {
  margin-bottom: 12px;
}

label {
  font-size: 14px;
}

input[type="time"] {
  padding: 6px;
  border-radius: 6px;
  border: 1px solid #ccc;
}

button {
  margin-top: 10px;
  padding: 10px;
  background: #2e7d32;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  background: #1b5e20;
}

#mensaje {
  margin-top: 10px;
  font-weight: bold;
  text-align: center;
}

.exito {
  color: green;
}

.error {
  color: red;
}

li {
  background: #f1f8e9;
  border-left: 4px solid #2e7d32;
  margin: 6px 0;
  padding: 6px;
  border-radius: 6px;
  font-size: 14px;
}
</style>

</head>

<body>

<div class="container">

<h1>💧 Sistema de Riego</h1>

<form id="formulario">

<div class="grupo">
<p>Días de riego:</p>
<label><input type="checkbox" value="Lunes"> Lunes</label><br>
<label><input type="checkbox" value="Martes"> Martes</label><br>
<label><input type="checkbox" value="Miércoles"> Miércoles</label><br>
<label><input type="checkbox" value="Jueves"> Jueves</label><br>
<label><input type="checkbox" value="Viernes"> Viernes</label><br>
<label><input type="checkbox" value="Sábado"> Sábado</label><br>
<label><input type="checkbox" value="Domingo"> Domingo</label>
</div>

<div class="grupo">
<p>Hora inicio:</p>
<input type="time" id="inicio">
</div>

<div class="grupo">
<p>Hora fin:</p>
<input type="time" id="fin">
</div>

<button type="submit">Enviar configuración</button>

</form>

<p id="mensaje"></p>
<ul id="lista"></ul>

</div>

<script>

const formulario = document.getElementById("formulario");
const inicio = document.getElementById("inicio");
const fin = document.getElementById("fin");
const checks = document.querySelectorAll("input[type=checkbox]");
const mensaje = document.getElementById("mensaje");
const lista = document.getElementById("lista");

let contador = 1;

formulario.addEventListener("submit", function(e) {
  e.preventDefault();

  let dias = [];

  checks.forEach(c => {
    if (c.checked) dias.push(c.value);
  });

  mensaje.className = "";

  if (dias.length === 0 || inicio.value === "" || fin.value === "") {
    mensaje.innerText = "⚠️ Completar todos los datos";
    mensaje.classList.add("error");
    return;
  }

  if (fin.value <= inicio.value) {
    mensaje.innerText = "⚠️ La hora de fin debe ser mayor que la de inicio";
    mensaje.classList.add("error");
    return;
  }

  mensaje.innerText = "✅ Configuración enviada al dispositivo";
  mensaje.classList.add("exito");

  lista.innerHTML += `
    <li>
      <strong>Riego ${contador}</strong><br>
      ${dias.join(", ")}<br>
      ⏱ ${inicio.value} - ${fin.value}
    </li>
  `;

  contador++;

  formulario.reset();
});

</script>

</body>
</html>
