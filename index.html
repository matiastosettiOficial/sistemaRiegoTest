<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Panel de Riego</title>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: #eef5f1;
  margin: 0;
}

/* HEADER */
.header {
  background: #1b5e20;
  padding: 15px;
  text-align: center;
}

.header img {
  width: 140px;
}

/* CONTENEDOR */
.container {
  padding: 20px;
  max-width: 400px;
  margin: auto;
}

/* CARD */
.card {
  background: white;
  border-radius: 12px;
  padding: 15px;
  margin-bottom: 15px;
  box-shadow: 0 6px 15px rgba(0,0,0,0.1);
}

h2 {
  margin-top: 0;
  color: #2e7d32;
}

/* INPUTS */
input[type="time"] {
  width: 100%;
  padding: 8px;
  margin: 6px 0;
  border-radius: 6px;
  border: 1px solid #ccc;
}

/* GRID DIAS */
.dias {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
}

/* BOTÓN */
.btn {
  width: 100%;
  padding: 12px;
  background: #2e7d32;
  color: white;
  border: none;
  border-radius: 8px;
  margin-top: 10px;
  font-weight: bold;
  cursor: pointer;
}

.btn:hover {
  background: #1b5e20;
}

/* MENSAJE */
#mensaje {
  text-align: center;
  font-weight: bold;
  margin: 10px 0;
}

.exito { color: green; }
.error { color: red; }

/* TARJETAS */
.riego {
  background: #f1f8e9;
  border-left: 5px solid #2e7d32;
  padding: 10px;
  border-radius: 8px;
  margin-bottom: 10px;
}

.activo {
  border-left: 5px solid #00c853;
  background: #e8f5e9;
}

.inactivo {
  opacity: 0.7;
}

.estado {
  font-size: 13px;
  font-weight: bold;
}

/* BOTÓN BORRAR */
.delete {
  margin-top: 5px;
  background: #c62828;
  color: white;
  border: none;
  padding: 5px;
  border-radius: 5px;
  cursor: pointer;
}
</style>

</head>

<body>

<div class="header">
  <img src="IDENTIDAD HUERTAS FAMILIARES FONDO BLANCO.jpg">
</div>

<div class="container">

<div class="card">
  <h2>⚙️ Nueva configuración</h2>

  <form id="formulario">

    <div class="dias">
      <label><input type="checkbox" value="Lunes"> Lunes</label>
      <label><input type="checkbox" value="Martes"> Martes</label>
      <label><input type="checkbox" value="Miércoles"> Miércoles</label>
      <label><input type="checkbox" value="Jueves"> Jueves</label>
      <label><input type="checkbox" value="Viernes"> Viernes</label>
      <label><input type="checkbox" value="Sábado"> Sábado</label>
      <label><input type="checkbox" value="Domingo"> Domingo</label>
    </div>

    <input type="time" id="inicio">
    <input type="time" id="fin">

    <button class="btn" type="submit">📡 Enviar al dispositivo</button>

  </form>

  <p id="mensaje"></p>
</div>

<div class="card">
  <h2>🌱 Programaciones</h2>
  <div id="lista"></div>
</div>

</div>

<script>

let datos = JSON.parse(localStorage.getItem("riegos")) || [];

const formulario = document.getElementById("formulario");
const inicio = document.getElementById("inicio");
const fin = document.getElementById("fin");
const checks = document.querySelectorAll("input[type=checkbox]");
const mensaje = document.getElementById("mensaje");
const lista = document.getElementById("lista");

function guardar() {
  localStorage.setItem("riegos", JSON.stringify(datos));
}

function obtenerDiaActual() {
  return ["Domingo","Lunes","Martes","Miércoles","Jueves","Viernes","Sábado"][new Date().getDay()];
}

function estaActivo(riego) {
  const ahora = new Date();
  const hora = ahora.toTimeString().slice(0,5);
  const dia = obtenerDiaActual();

  return riego.dias.includes(dia) && hora >= riego.inicio && hora <= riego.fin;
}

function render() {
  lista.innerHTML = "";

  datos.forEach((r, i) => {

    const activo = estaActivo(r);

    lista.innerHTML += `
      <div class="riego ${activo ? "activo" : "inactivo"}">
        <strong>Riego ${i+1}</strong>
        <p>${r.dias.join(", ")}</p>
        <p>⏱ ${r.inicio} - ${r.fin}</p>
        <p class="estado">${activo ? "🟢 Activo ahora" : "⚪ Programado"}</p>
        <button class="delete" onclick="eliminar(${i})">Eliminar</button>
      </div>
    `;
  });
}

function eliminar(index) {
  datos.splice(index, 1);
  guardar();
  render();
}

formulario.addEventListener("submit", function(e) {
  e.preventDefault();

  let dias = [];
  checks.forEach(c => { if (c.checked) dias.push(c.value); });

  mensaje.className = "";

  if (dias.length === 0 || inicio.value === "" || fin.value === "") {
    mensaje.innerText = "⚠️ Completar todos los datos";
    mensaje.classList.add("error");
    return;
  }

  if (fin.value <= inicio.value) {
    mensaje.innerText = "⚠️ Hora fin debe ser mayor";
    mensaje.classList.add("error");
    return;
  }

  datos.push({
    dias: dias,
    inicio: inicio.value,
    fin: fin.value
  });

  guardar();
  render();

  mensaje.innerText = "✅ Configuración guardada";
  mensaje.classList.add("exito");

  formulario.reset();
});

render();

</script>

</body>
</html>
