<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Panel de Riego</title>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: #eef5f1;
  margin: 0;
}

.header {
  background: #1b5e20;
  padding: 15px;
  text-align: center;
}

.header img {
  width: 140px;
}

.container {
  padding: 20px;
  max-width: 400px;
  margin: auto;
}

.card {
  background: white;
  border-radius: 12px;
  padding: 15px;
  margin-bottom: 15px;
  box-shadow: 0 6px 15px rgba(0,0,0,0.1);
}

h2 {
  margin-top: 0;
  color: #2e7d32;
}

/* BOTÓN ON/OFF */
.toggle {
  width: 100%;
  padding: 15px;
  font-size: 18px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
  font-weight: bold;
}

.on {
  background: #00c853;
  color: white;
}

.off {
  background: #b0bec5;
  color: white;
}

/* FORM */
input[type="time"] {
  width: 100%;
  padding: 8px;
  margin: 6px 0;
  border-radius: 6px;
  border: 1px solid #ccc;
}

.dias {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
}

.btn {
  width: 100%;
  padding: 12px;
  background: #2e7d32;
  color: white;
  border: none;
  border-radius: 8px;
  margin-top: 10px;
  cursor: pointer;
}

#mensaje {
  text-align: center;
  font-weight: bold;
}

.exito { color: green; }
.error { color: red; }

/* TARJETAS */
.riego {
  background: #f1f8e9;
  border-left: 5px solid #2e7d32;
  padding: 10px;
  border-radius: 8px;
  margin-bottom: 10px;
}

.activo {
  border-left: 5px solid #00c853;
}

.delete {
  background: red;
  color: white;
  border: none;
  padding: 5px;
  border-radius: 5px;
  cursor: pointer;
}
</style>

</head>

<body>

<div class="header">
  <img src="IDENTIDAD HUERTAS FAMILIARES FONDO BLANCO.jpg">
</div>

<div class="container">

<div class="card">
  <h2>🎛️ Control</h2>
  <button id="toggleBtn" class="toggle">OFF</button>
</div>

<div class="card">
  <h2>⚙️ Nueva configuración</h2>

  <form id="formulario">

    <div class="dias">
      <label><input type="checkbox" value="Lunes"> Lunes</label>
      <label><input type="checkbox" value="Martes"> Martes</label>
      <label><input type="checkbox" value="Miércoles"> Miércoles</label>
      <label><input type="checkbox" value="Jueves"> Jueves</label>
      <label><input type="checkbox" value="Viernes"> Viernes</label>
      <label><input type="checkbox" value="Sábado"> Sábado</label>
      <label><input type="checkbox" value="Domingo"> Domingo</label>
    </div>

    <input type="time" id="inicio">
    <input type="time" id="fin">

    <button class="btn" type="submit">📡 Enviar</button>

  </form>

  <p id="mensaje"></p>
</div>

<div class="card">
  <h2>🌱 Programaciones</h2>
  <div id="lista"></div>
</div>

</div>

<script>

// ====== ESTADOS ======
let estadoManual = localStorage.getItem("estadoManual") || "auto";
let datos = JSON.parse(localStorage.getItem("riegos")) || [];

const toggleBtn = document.getElementById("toggleBtn");

// ====== TIEMPO ======
function obtenerDiaActual() {
  return ["Domingo","Lunes","Martes","Miércoles","Jueves","Viernes","Sábado"][new Date().getDay()];
}

function hayRiegoActivo() {
  const ahora = new Date();
  const hora = ahora.toTimeString().slice(0,5);
  const dia = obtenerDiaActual();

  return datos.some(r =>
    r.dias.includes(dia) &&
    hora >= r.inicio &&
    hora <= r.fin
  );
}

// ====== ESTADO FINAL ======
function sistemaActivo() {
  if (estadoManual === "on") return true;
  if (estadoManual === "off") return false;
  return hayRiegoActivo();
}

// ====== BOTÓN ======
function actualizarBoton() {
  if (sistemaActivo()) {
    toggleBtn.innerText = "ON";
    toggleBtn.className = "toggle on";
  } else {
    toggleBtn.innerText = "OFF";
    toggleBtn.className = "toggle off";
  }
}

toggleBtn.addEventListener("click", () => {
  if (estadoManual === "auto") estadoManual = "on";
  else if (estadoManual === "on") estadoManual = "off";
  else estadoManual = "auto";

  localStorage.setItem("estadoManual", estadoManual);
  actualizarBoton();
});

actualizarBoton();

// ====== FORM ======
const formulario = document.getElementById("formulario");
const inicio = document.getElementById("inicio");
const fin = document.getElementById("fin");
const checks = document.querySelectorAll("input[type=checkbox]");
const mensaje = document.getElementById("mensaje");
const lista = document.getElementById("lista");

function guardar() {
  localStorage.setItem("riegos", JSON.stringify(datos));
}

function render() {
  lista.innerHTML = "";

  datos.forEach((r, i) => {
    const activo = sistemaActivo();

    lista.innerHTML += `
      <div class="riego ${activo ? "activo" : ""}">
        <strong>Riego ${i+1}</strong>
        <p>${r.dias.join(", ")}</p>
        <p>⏱ ${r.inicio} - ${r.fin}</p>
        <button class="delete" onclick="eliminar(${i})">Eliminar</button>
      </div>
    `;
  });

  actualizarBoton();
}

function eliminar(index) {
  datos.splice(index, 1);
  guardar();
  render();
}

formulario.addEventListener("submit", function(e) {
  e.preventDefault();

  let dias = [];
  checks.forEach(c => { if (c.checked) dias.push(c.value); });

  mensaje.className = "";

  if (dias.length === 0 || inicio.value === "" || fin.value === "") {
    mensaje.innerText = "⚠️ Completar datos";
    mensaje.classList.add("error");
    return;
  }

  if (fin.value <= inicio.value) {
    mensaje.innerText = "⚠️ Hora fin inválida";
    mensaje.classList.add("error");
    return;
  }

  datos.push({ dias, inicio: inicio.value, fin: fin.value });

  guardar();
  render();

  mensaje.innerText = "✅ Guardado";
  mensaje.classList.add("exito");

  formulario.reset();
});

render();

// actualización automática
setInterval(() => {
  actualizarBoton();
  render();
}, 30000);

</script>

</body>
</html>
